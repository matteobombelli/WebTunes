services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: webtunes
      POSTGRES_PASSWORD: webtunes
      POSTGRES_DB: webtunes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webtunes"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Offline downloads fetch presigned URLs from the browser; the app
      # origin must be CORS-allowed (prod equivalent: scripts/s3-cors.json).
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:3000
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/webtunes
      "

volumes:
  pgdata:
  miniodata:
